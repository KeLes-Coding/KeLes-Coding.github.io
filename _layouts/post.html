---
layout: default
---

<article class="post mx-auto max-w-3xl">
  {% include post_breadcrumb.html post=page %}
  <div class="mb-6 flex flex-wrap items-center gap-3 text-xs font-bold uppercase tracking-[0.24em] text-on-surface-variant">
    <span>{{ page.date | date: "%Y-%m-%d" }}</span>
    {% if page.city %}<span>{{ page.city }}</span>{% endif %}
    <span>{{ page.author | default: site.author }}</span>
  </div>
  <h1 class="mb-8 font-h1 text-h1 text-primary">{{ page.title }}</h1>
  {{ content }}
</article>

<a href="{{ '/blog/' | relative_url }}" class="back-link mt-10 inline-flex items-center gap-2 text-sm uppercase tracking-[0.16em] text-on-surface-variant transition-colors duration-200 hover:text-primary">&larr; Back to blog</a>
