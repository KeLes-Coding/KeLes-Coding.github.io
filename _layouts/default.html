<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            tertiary: "#000000",
            "on-tertiary-container": "#838484",
            "surface-container-high": "#e8e8e8",
            "on-secondary-fixed-variant": "#474746",
            "on-error": "#ffffff",
            surface: "#f9f9f9",
            "primary-container": "#1b1b1b",
            "tertiary-container": "#1a1c1c",
            "primary-fixed-dim": "#c6c6c6",
            "on-tertiary-fixed-variant": "#464747",
            "on-background": "#1a1c1c",
            "surface-variant": "#e2e2e2",
            "tertiary-fixed-dim": "#c7c6c6",
            outline: "#7e7576",
            "on-primary": "#ffffff",
            "on-primary-container": "#848484",
            "on-secondary-container": "#636262",
            "tertiary-fixed": "#e3e2e2",
            "on-primary-fixed-variant": "#474747",
            "inverse-surface": "#2f3131",
            "on-secondary-fixed": "#1b1c1c",
            "inverse-primary": "#c6c6c6",
            "surface-container": "#eeeeee",
            background: "#f9f9f9",
            "secondary-fixed": "#e5e2e1",
            secondary: "#5f5e5e",
            "outline-variant": "#cfc4c5",
            "surface-bright": "#f9f9f9",
            "surface-container-highest": "#e2e2e2",
            "on-error-container": "#93000a",
            "secondary-fixed-dim": "#c8c6c5",
            "on-surface": "#1a1c1c",
            "on-primary-fixed": "#1b1b1b",
            "surface-container-lowest": "#ffffff",
            "inverse-on-surface": "#f1f1f1",
            "primary-fixed": "#e2e2e2",
            "surface-tint": "#5e5e5e",
            "on-surface-variant": "#4c4546",
            "on-tertiary": "#ffffff",
            "on-secondary": "#ffffff",
            "secondary-container": "#e2dfde",
            "on-tertiary-fixed": "#1a1c1c",
            "error-container": "#ffdad6",
            primary: "#000000",
            "surface-dim": "#dadada",
            "surface-container-low": "#f3f3f3",
            error: "#ba1a1a"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            unit: "8px",
            gutter: "24px",
            "section-padding": "80px",
            "margin-mobile": "16px",
            "container-max": "1120px"
          },
          fontFamily: {
            "body-md": ["Inter", "sans-serif"],
            code: ["monospace"],
            h3: ["Inter", "sans-serif"],
            "body-lg": ["Inter", "sans-serif"],
            "label-caps": ["Inter", "sans-serif"],
            h1: ["Inter", "sans-serif"],
            h2: ["Inter", "sans-serif"]
          },
          fontSize: {
            "body-md": ["16px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
            code: ["14px", { lineHeight: "1.5", fontWeight: "400" }],
            h3: ["24px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
            "label-caps": ["12px", { lineHeight: "1.2", letterSpacing: "0.1em", fontWeight: "700" }],
            h1: ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
            h2: ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }]
          }
        }
      }
    };
  </script>
  <script>
    if (localStorage.getItem("theme") === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="min-h-screen bg-surface-container-lowest font-body-md text-on-surface antialiased">
  {% assign current_url = page.url | replace: 'index.html', '' %}
  <div class="flex min-h-screen flex-col">
    <nav class="w-full border-b border-neutral-200 bg-white/90 px-6 py-6 backdrop-blur md:px-8 dark:border-neutral-800 dark:bg-neutral-950/90">
      <div class="mx-auto flex max-w-screen-2xl items-center justify-between">
        <a class="text-lg font-black tracking-tighter text-neutral-900 transition-opacity duration-200 hover:opacity-80 dark:text-neutral-50" href="{{ '/' | relative_url }}">{{ site.title | upcase | replace: " ", "_" }}</a>
        <div class="hidden items-center space-x-8 text-sm uppercase tracking-wider md:flex">
          <a class="{% if current_url == '/' %}border-b border-neutral-900 pb-1 font-bold text-neutral-900 dark:border-neutral-50 dark:text-neutral-50{% else %}text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50{% endif %}" href="{{ '/' | relative_url }}">Home</a>
          <a class="text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50" href="{{ '/#posts' | relative_url }}">Blog</a>
          <a class="{% if current_url == '/about/' %}border-b border-neutral-900 pb-1 font-bold text-neutral-900 dark:border-neutral-50 dark:text-neutral-50{% else %}text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50{% endif %}" href="{{ '/about/' | relative_url }}">About</a>
        </div>
        <button class="flex items-center transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" id="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="material-symbols-outlined dark:hidden">dark_mode</span>
          <span class="material-symbols-outlined hidden dark:block">light_mode</span>
        </button>
      </div>
    </nav>
    <main class="flex-grow px-6 py-[80px] md:px-12">
      <div class="mx-auto w-full max-w-[1120px]">
        {{ content }}
      </div>
    </main>
    <footer class="w-full border-t border-neutral-200 bg-white px-6 py-10 text-xs uppercase tracking-[0.2em] text-neutral-500 md:px-8 dark:border-neutral-800 dark:bg-neutral-950 dark:text-neutral-400">
      <div class="mx-auto flex max-w-screen-2xl flex-col items-start justify-between gap-4 md:flex-row md:items-center">
        <div>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Built with precision.</div>
        <div class="flex gap-6">
          <a class="transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" href="{{ site.github.repository_url | default: 'https://github.com/keles-coding' }}">GitHub</a>
          <a class="transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" href="{{ '/about/' | relative_url }}">About</a>
          <a class="transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" href="{{ '/feed.xml' | relative_url }}">RSS</a>
        </div>
      </div>
    </footer>
  </div>
  <script>
    const themeToggleBtn = document.getElementById("theme-toggle");
    const htmlElement = document.documentElement;

    themeToggleBtn.addEventListener("click", () => {
      if (htmlElement.classList.contains("dark")) {
        htmlElement.classList.remove("dark");
        localStorage.setItem("theme", "light");
      } else {
        htmlElement.classList.add("dark");
        localStorage.setItem("theme", "dark");
      }
    });
  </script>
</body>
</html>
