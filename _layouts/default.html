<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "var(--color-primary)",
            "on-primary": "var(--color-on-primary)",
            "on-primary-container": "var(--color-on-primary-container)",
            "primary-container": "var(--color-primary-container)",
            "primary-fixed": "var(--color-primary-fixed)",
            "primary-fixed-dim": "var(--color-primary-fixed-dim)",
            "on-primary-fixed": "var(--color-on-primary-fixed)",
            "on-primary-fixed-variant": "var(--color-on-primary-fixed-variant)",
            secondary: "var(--color-secondary)",
            "secondary-container": "var(--color-secondary-container)",
            "on-secondary": "var(--color-on-secondary)",
            "on-secondary-container": "var(--color-on-secondary-container)",
            "secondary-fixed": "var(--color-secondary-fixed)",
            "secondary-fixed-dim": "var(--color-secondary-fixed-dim)",
            "on-secondary-fixed": "var(--color-on-secondary-fixed)",
            "on-secondary-fixed-variant": "var(--color-on-secondary-fixed-variant)",
            tertiary: "var(--color-tertiary)",
            "on-tertiary": "var(--color-on-tertiary)",
            "tertiary-container": "var(--color-tertiary-container)",
            "on-tertiary-container": "var(--color-on-tertiary-container)",
            "tertiary-fixed": "var(--color-tertiary-fixed)",
            "tertiary-fixed-dim": "var(--color-tertiary-fixed-dim)",
            "on-tertiary-fixed": "var(--color-on-tertiary-fixed)",
            "on-tertiary-fixed-variant": "var(--color-on-tertiary-fixed-variant)",
            error: "var(--color-error)",
            "on-error": "var(--color-on-error)",
            "error-container": "var(--color-error-container)",
            "on-error-container": "var(--color-on-error-container)",
            background: "var(--color-background)",
            "on-background": "var(--color-on-background)",
            surface: "var(--color-surface)",
            "on-surface": "var(--color-on-surface)",
            "on-surface-variant": "var(--color-on-surface-variant)",
            "surface-variant": "var(--color-surface-variant)",
            "surface-container": "var(--color-surface-container)",
            "surface-container-low": "var(--color-surface-container-low)",
            "surface-container-lowest": "var(--color-surface-container-lowest)",
            "surface-container-high": "var(--color-surface-container-high)",
            "surface-container-highest": "var(--color-surface-container-highest)",
            "surface-bright": "var(--color-surface-bright)",
            "surface-dim": "var(--color-surface-dim)",
            "surface-tint": "var(--color-surface-tint)",
            outline: "var(--color-outline)",
            "outline-variant": "var(--color-outline-variant)",
            "inverse-surface": "var(--color-inverse-surface)",
            "inverse-on-surface": "var(--color-inverse-on-surface)",
            "inverse-primary": "var(--color-inverse-primary)",
	            accent: "var(--color-accent)",
	            "accent-hover": "var(--color-accent-hover)"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            unit: "8px",
            gutter: "24px",
            "section-padding": "80px",
            "margin-mobile": "16px",
            "container-max": "1120px"
          },
          fontFamily: {
            "body-md": ["Inter", "sans-serif"],
            code: ["monospace"],
            h3: ["Inter", "sans-serif"],
            "body-lg": ["Inter", "sans-serif"],
            "label-caps": ["Inter", "sans-serif"],
            h1: ["Inter", "sans-serif"],
            h2: ["Inter", "sans-serif"]
          },
          fontSize: {
            "body-md": ["16px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
            code: ["14px", { lineHeight: "1.5", fontWeight: "400" }],
            h3: ["24px", { lineHeight: "1.3", letterSpacing: "-0.01em", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "1.6", letterSpacing: "0", fontWeight: "400" }],
            "label-caps": ["12px", { lineHeight: "1.2", letterSpacing: "0.1em", fontWeight: "700" }],
            h1: ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
            h2: ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }]
          }
        }
      }
    };
  </script>
  <script>
    if (localStorage.getItem("theme") === "dark" || (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/syntax-highlighting.css' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/icon/favicon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/icon/favicon-32.png' | relative_url }}">
</head>
<body class="min-h-screen bg-surface-container-lowest font-body-md text-on-surface antialiased">
  {% assign current_url = page.url | replace: 'index.html', '' %}
  <div class="flex min-h-screen flex-col">
    <nav class="w-full border-b border-neutral-200 bg-white/90 px-6 py-6 backdrop-blur md:px-8 dark:border-neutral-800 dark:bg-neutral-950/90">
      <div class="mx-auto flex max-w-screen-2xl items-center justify-between">
        <a class="flex items-center gap-3 text-lg font-black tracking-tighter text-neutral-900 transition-opacity duration-200 hover:opacity-80 dark:text-neutral-50" href="{{ '/' | relative_url }}">
            <img src="{{ '/icon/icon1.png' | relative_url }}" alt="KeLes" class="site-icon">
            {{ site.title | upcase | replace: " ", "_" }}
          </a>
        <div class="hidden items-center space-x-8 text-sm uppercase tracking-wider md:flex">
          <a class="{% if current_url == '/' %}border-b border-neutral-900 pb-1 font-bold text-neutral-900 dark:border-neutral-50 dark:text-neutral-50{% else %}text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50{% endif %}" href="{{ '/' | relative_url }}">Home</a>
          <a class="{% if current_url == '/blog/' %}border-b border-neutral-900 pb-1 font-bold text-neutral-900 dark:border-neutral-50 dark:text-neutral-50{% else %}text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50{% endif %}" href="{{ '/blog/' | relative_url }}">Blog</a>
          <a class="{% if current_url == '/about/' %}border-b border-neutral-900 pb-1 font-bold text-neutral-900 dark:border-neutral-50 dark:text-neutral-50{% else %}text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50{% endif %}" href="{{ '/about/' | relative_url }}">About</a>
        </div>
        <div class="flex items-center gap-4">
          {% if current_url == '/blog/' %}
          <div class="flex items-center gap-2">
            <label for="blog-search" class="cursor-pointer">
              <span class="material-symbols-outlined text-xl text-neutral-400 transition-colors duration-200 hover:text-neutral-900 dark:text-neutral-600 dark:hover:text-neutral-50">search</span>
            </label>
            <input id="blog-search" type="text" placeholder="Search posts&hellip;" class="w-0 overflow-hidden border-b border-transparent bg-transparent text-sm text-neutral-900 outline-none transition-all duration-200 placeholder:text-neutral-400 focus:w-40 focus:border-neutral-400 dark:text-neutral-50 dark:focus:border-neutral-600 dark:placeholder:text-neutral-600" />
          </div>
          {% endif %}
          <button class="flex items-center transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" id="theme-toggle" type="button" aria-label="Toggle theme">
            <span class="material-symbols-outlined dark:hidden">dark_mode</span>
            <span class="material-symbols-outlined hidden dark:block">light_mode</span>
          </button>
        </div>
      </div>
    </nav>
    <main class="flex-grow px-6 py-[80px] md:px-12">
      <div class="mx-auto w-full max-w-[1120px]">
        {{ content }}
      </div>
    </main>
    <footer class="w-full border-t border-neutral-200 bg-white px-6 py-10 text-xs uppercase tracking-[0.2em] text-neutral-500 md:px-8 dark:border-neutral-800 dark:bg-neutral-950 dark:text-neutral-400">
      <div class="mx-auto flex max-w-screen-2xl flex-col items-start justify-between gap-4 md:flex-row md:items-center">
        <div>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. Built with precision.</div>
        <div class="flex gap-6">
          <a class="transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" href="{{ site.github.repository_url | default: 'https://github.com/keles-coding' }}">GitHub</a>
          <a class="transition-colors duration-200 hover:text-neutral-900 dark:hover:text-neutral-50" href="{{ '/about/' | relative_url }}">About</a>
        </div>
      </div>
    </footer>
  </div>
  <script>
    const themeToggleBtn = document.getElementById("theme-toggle");
    const htmlElement = document.documentElement;

    themeToggleBtn.addEventListener("click", () => {
      if (htmlElement.classList.contains("dark")) {
        htmlElement.classList.remove("dark");
        localStorage.setItem("theme", "light");
      } else {
        htmlElement.classList.add("dark");
        localStorage.setItem("theme", "dark");
      }
    });
  </script>
</body>
</html>
