{% comment %}
  Full post file tree for the left sidebar. Counts include all descendant posts.
{% endcomment %}
{% assign visible_posts = site.posts | where_exp: "p", "p.visible != false" %}

<nav class="post-nav post-tree" id="post-file-tree" aria-label="Post file tree"></nav>

<script>
(function() {
  var currentUrl = {{ include.post.url | relative_url | jsonify }};
  var posts = [
    {% for post in visible_posts %}
    {% assign parts = post.path | split: "/" %}
    {% assign folder_segments = "" | split: "" %}
    {% for segment in parts %}
      {% if forloop.index0 > 0 and forloop.last == false %}
        {% assign folder_segments = folder_segments | push: segment %}
      {% endif %}
    {% endfor %}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      folders: [{% for folder in folder_segments %}{{ folder | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var treeEl = document.getElementById('post-file-tree');
  if (!treeEl || !posts.length) return;

  function makeNode(name) {
    return { name: name, children: [], childMap: Object.create(null), posts: [], count: 0 };
  }

  function getChild(node, name) {
    if (!node.childMap[name]) {
      node.childMap[name] = makeNode(name);
      node.children.push(node.childMap[name]);
    }
    return node.childMap[name];
  }

  function buildTree(items) {
    var root = makeNode('Posts');
    items.forEach(function(post) {
      var node = root;
      node.count += 1;
      post.folders.forEach(function(folder) {
        node = getChild(node, folder);
        node.count += 1;
      });
      node.posts.push(post);
    });
    return root;
  }

  function containsCurrent(node) {
    return node.posts.some(function(post) { return post.url === currentUrl; }) ||
      node.children.some(containsCurrent);
  }

  function renderPost(post, parent) {
    var link = document.createElement('a');
    link.className = 'post-nav-link' + (post.url === currentUrl ? ' active' : '');
    link.href = post.url;
    link.textContent = post.title;
    parent.appendChild(link);
  }

  function renderNode(node, parent, isRoot) {
    if (isRoot) {
      var title = document.createElement('div');
      title.className = 'post-nav-title';
      title.textContent = 'Posts';
      var total = document.createElement('span');
      total.className = 'post-tree-count';
      total.textContent = node.count;
      title.appendChild(total);
      parent.appendChild(title);
    }

    node.posts.forEach(function(post) {
      renderPost(post, parent);
    });

    node.children.forEach(function(child) {
      var details = document.createElement('details');
      details.className = 'post-tree-folder';
      details.open = containsCurrent(child);

      var summary = document.createElement('summary');
      var name = document.createElement('span');
      name.className = 'post-tree-folder-name';
      name.textContent = child.name;
      var count = document.createElement('span');
      count.className = 'post-tree-count';
      count.textContent = child.count;
      summary.appendChild(name);
      summary.appendChild(count);
      details.appendChild(summary);

      var body = document.createElement('div');
      body.className = 'post-tree-children';
      renderNode(child, body, false);
      details.appendChild(body);
      parent.appendChild(details);
    });
  }

  renderNode(buildTree(posts), treeEl, true);
})();
</script>
