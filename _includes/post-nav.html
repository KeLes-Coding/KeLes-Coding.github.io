{% comment %}
  Full post file tree for the left sidebar. Matches the designer's template style.
{% endcomment %}
{% assign visible_posts = site.posts | where_exp: "p", "p.visible != false" %}

<nav class="post-nav" id="post-file-tree" aria-label="Post file tree"></nav>

<script>
(function() {
  var currentUrl = {{ include.post.url | relative_url | jsonify }};
  var posts = [
    {% for post in visible_posts %}
    {% assign parts = post.path | split: "/" %}
    {% assign folder_segments = "" | split: "" %}
    {% for segment in parts %}
      {% if forloop.index0 > 0 and forloop.last == false %}
        {% assign folder_segments = folder_segments | push: segment %}
      {% endif %}
    {% endfor %}
    {% assign display_title = post.data.title | default: post.title | default: post.name %}
    {
      title: {{ display_title | jsonify }},
      fileTitle: {{ post.name | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      date: {{ post.date | date: "%Y-%m-%d" | jsonify }},
      folders: [{% for folder in folder_segments %}{{ folder | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var treeEl = document.getElementById('post-file-tree');
  if (!treeEl || !posts.length) return;

  function makeNode(name) {
    return { name: name, children: [], childMap: Object.create(null), posts: [], count: 0, oldestDate: '' };
  }

  function extractOrderNumber(text) {
    var match = String(text || '').match(/(?:^|[^0-9])(\d+)\s*[.．、]/);
    return match ? Number(match[1]) : null;
  }

  function compareByOrderThenDate(a, b) {
    var aOrder = extractOrderNumber(a.title || a.name);
    var bOrder = extractOrderNumber(b.title || b.name);
    if (aOrder !== null && bOrder !== null && aOrder !== bOrder) return aOrder - bOrder;
    if (aOrder !== null && bOrder === null) return -1;
    if (aOrder === null && bOrder !== null) return 1;
    var aDate = a.oldestDate || a.date || '';
    var bDate = b.oldestDate || b.date || '';
    if (aDate !== bDate) return aDate.localeCompare(bDate);
    return String(a.title || a.name).localeCompare(String(b.title || b.name), 'zh-Hans-CN');
  }

  function sortTree(node) {
    node.posts.sort(compareByOrderThenDate);
    node.children.sort(compareByOrderThenDate);
    node.children.forEach(sortTree);
  }

  function getChild(node, name) {
    if (!node.childMap[name]) {
      node.childMap[name] = makeNode(name);
      node.children.push(node.childMap[name]);
    }
    return node.childMap[name];
  }

  function buildTree(items) {
    var root = makeNode('Posts');
    items.forEach(function(post) {
      var node = root;
      node.count += 1;
      if (!node.oldestDate || post.date < node.oldestDate) node.oldestDate = post.date;
      post.folders.forEach(function(folder) {
        node = getChild(node, folder);
        node.count += 1;
        if (!node.oldestDate || post.date < node.oldestDate) node.oldestDate = post.date;
      });
      node.posts.push(post);
    });
    sortTree(root);
    return root;
  }

  function containsCurrent(node) {
    return node.posts.some(function(post) { return post.url === currentUrl; }) ||
      node.children.some(containsCurrent);
  }

  function renderPost(post) {
    var li = document.createElement('li');
    var link = document.createElement('a');
    link.className = 'post-nav-link' + (post.url === currentUrl ? ' active' : '');
    link.href = post.url;
    link.textContent = post.title || post.fileTitle || 'Untitled';
    li.appendChild(link);
    return li;
  }

  function renderFolder(node) {
    var li = document.createElement('li');
    li.className = 'post-nav-folder-item';
    if (containsCurrent(node)) li.classList.add('open');

    var btn = document.createElement('button');
    btn.className = 'post-nav-folder-btn';
    btn.addEventListener('click', function() {
      li.classList.toggle('open');
    });

    var iconSpan = document.createElement('span');
    iconSpan.className = 'post-nav-folder-icon';
    iconSpan.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px">folder</span>';

    var nameSpan = document.createElement('span');
    nameSpan.className = 'post-nav-folder-name';
    nameSpan.textContent = node.name;

    var arrow = document.createElement('span');
    arrow.className = 'post-nav-folder-arrow material-symbols-outlined';
    arrow.textContent = 'chevron_right';

    btn.appendChild(iconSpan);
    btn.appendChild(nameSpan);
    btn.appendChild(arrow);
    li.appendChild(btn);

    // Update icon based on open state
    function updateIcon() {
      var isOpen = li.classList.contains('open');
      iconSpan.querySelector('.material-symbols-outlined').textContent = isOpen ? 'folder_open' : 'folder';
    }
    var observer = new MutationObserver(updateIcon);
    observer.observe(li, { attributes: true, attributeFilter: ['class'] });
    updateIcon();

    var subtree = document.createElement('ul');
    subtree.className = 'post-nav-subtree';

    node.posts.forEach(function(post) {
      subtree.appendChild(renderPost(post));
    });

    node.children.forEach(function(child) {
      subtree.appendChild(renderFolder(child));
    });

    li.appendChild(subtree);
    return li;
  }

  // Build the tree UI
  var section = document.createElement('div');
  section.className = 'post-nav-section';

  var label = document.createElement('div');
  label.className = 'post-nav-label';
  label.textContent = 'Navigation';
  section.appendChild(label);

  var treeList = document.createElement('ul');
  treeList.className = 'post-nav-tree';

  var root = buildTree(posts);

  // Render top-level folder children directly
  root.children.forEach(function(child) {
    treeList.appendChild(renderFolder(child));
  });

  // Render standalone posts (no folder)
  root.posts.forEach(function(post) {
    treeList.appendChild(renderPost(post));
  });

  section.appendChild(treeList);
  treeEl.appendChild(section);
})();
</script>
