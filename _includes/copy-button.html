<script>
document.addEventListener('DOMContentLoaded', function() {
  var codeBlocks = document.querySelectorAll('.post .highlight');
  for (var i = 0; i < codeBlocks.length; i++) {
    var block = codeBlocks[i];
    var pre = null;
    var hasToolbar = false;

    for (var childIndex = 0; childIndex < block.children.length; childIndex++) {
      var child = block.children[childIndex];
      if (child.classList.contains('code-block-toolbar')) { hasToolbar = true; }
      if (!pre && child.tagName === 'PRE') { pre = child; }
    }
    if (hasToolbar) continue;
    if (!pre) continue;

    var code = null;
    for (var codeIndex = 0; codeIndex < pre.children.length; codeIndex++) {
      if (pre.children[codeIndex].tagName === 'CODE') {
        code = pre.children[codeIndex];
        break;
      }
    }
    if (!code) continue;

    // Find language from code element or outer wrapper (Rogue puts language-* on outer div)
    var lang = '';
    var isMermaid = false;
    var sources = [code.className];
    if (block.parentElement && block.parentElement !== block) {
      sources.push(block.parentElement.className);
    }
    for (var s = 0; s < sources.length; s++) {
      var classList = sources[s].split(' ');
      for (var j = 0; j < classList.length; j++) {
        var className = classList[j];
        var lowerClassName = className.toLowerCase();
        if (lowerClassName === 'language-mermaid') { isMermaid = true; }
        if (lowerClassName.indexOf('language-') === 0) {
          lang = className.replace(/^language-/i, '');
          // Capitalize first letter for display
          lang = lang.charAt(0).toUpperCase() + lang.slice(1);
          // Map common Rouge language names to nicer display names
          var langMap = { 'Cpp': 'C++', 'Css': 'CSS', 'Scss': 'SCSS', 'Js': 'JavaScript', 'Ts': 'TypeScript', 'Tsx': 'TSX', 'Jsx': 'JSX', 'Sh': 'Shell', 'Bash': 'Bash', 'Zsh': 'Zsh', 'Sql': 'SQL', 'Yml': 'YAML', 'Yaml': 'YAML', 'Ml': 'OCaml', 'Rs': 'Rust', 'Py': 'Python', 'Rb': 'Ruby', 'Go': 'Go', 'Java': 'Java', 'Php': 'PHP', 'Cs': 'C#', 'Fs': 'F#', 'Kt': 'Kotlin', 'Swift': 'Swift', 'R': 'R', 'M': 'MATLAB', 'Jl': 'Julia' };
          lang = langMap[lang] || lang;
        }
      }
    }
    if (isMermaid) continue;

    var toolbar = document.createElement('div');
    toolbar.className = 'code-block-toolbar';

    var label = document.createElement('span');
    label.className = 'code-block-lang';
    label.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px">code</span>' + (lang || 'CODE');
    toolbar.appendChild(label);

    var btn = document.createElement('button');
    btn.className = 'copy-button';
    btn.setAttribute('aria-label', 'Copy code');
    btn.innerHTML = '<span class="material-symbols-outlined">content_copy</span>';
    btn.addEventListener('click', (function(btn, code) {
      return function() {
        navigator.clipboard.writeText(code.textContent).then(function() {
          btn.innerHTML = '<span class="material-symbols-outlined">check</span>';
          setTimeout(function() {
            btn.innerHTML = '<span class="material-symbols-outlined">content_copy</span>';
          }, 2000);
        });
      };
    })(btn, code));
    toolbar.appendChild(btn);
    block.insertBefore(toolbar, block.firstChild);

    // Line numbers — skip for text/plaintext/no-language blocks
    var skipLineNums = !lang || lang.toLowerCase() === 'text' || lang.toLowerCase() === 'plaintext';
    if (!skipLineNums) {
      var lines = code.textContent.split('\n');
      if (lines.length > 0 && lines[lines.length - 1] === '') {
        lines.pop();
      }

      var lineNums = document.createElement('div');
      lineNums.className = 'code-block-linenums';
      for (var l = 0; l < lines.length; l++) {
        var numSpan = document.createElement('span');
        numSpan.textContent = l + 1;
        lineNums.appendChild(numSpan);
      }

      block.classList.add('has-linenums');
      block.insertBefore(lineNums, pre);
    }
  }
});
</script>
