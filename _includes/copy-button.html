<script>
document.addEventListener('DOMContentLoaded', function() {
  var codeBlocks = document.querySelectorAll('.post .highlight');
  for (var i = 0; i < codeBlocks.length; i++) {
    var block = codeBlocks[i];
    var code = block.querySelector('code');
    if (!code) continue;

    var classList = code.className.split(' ');
    var lang = '';
    var isMermaid = false;
    for (var j = 0; j < classList.length; j++) {
      if (classList[j] === 'language-mermaid') { isMermaid = true; }
      if (classList[j].indexOf('language-') === 0) { lang = classList[j].replace('language-', ''); }
    }
    if (isMermaid) continue;

    // ── 创建代码块顶部栏 ──
    var header = document.createElement('div');
    header.className = 'code-header';

    // 左侧：语言类型
    var langLabel = document.createElement('span');
    langLabel.className = 'code-lang';
    langLabel.textContent = lang || 'code';
    header.appendChild(langLabel);

    // 右侧：复制按钮
    var btn = document.createElement('button');
    btn.className = 'copy-button';
    btn.setAttribute('aria-label', 'Copy code');
    btn.innerHTML = '<span class="material-symbols-outlined">content_copy</span><span>Copy</span>';
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(code.textContent).then(function() {
        btn.innerHTML = '<span class="material-symbols-outlined">check</span><span>Copied!</span>';
        setTimeout(function() {
          btn.innerHTML = '<span class="material-symbols-outlined">content_copy</span><span>Copy</span>';
        }, 2000);
      });
    });
    header.appendChild(btn);

    block.insertBefore(header, block.firstChild);
  }
});
</script>
