<aside class="post-toc" id="post-toc">
  <div class="post-toc-title">目录</div>
  <div class="post-toc-content" id="post-toc-content"></div>
</aside>

<script>
(function() {
  function slugify(text) {
    return text.trim().toLowerCase()
      .replace(/[^\w\u4e00-\u9fa5-]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'section';
  }

  function headingText(heading) {
    var clone = heading.cloneNode(true);
    clone.querySelectorAll('.heading-anchor').forEach(function(anchor) {
      anchor.remove();
    });
    return clone.textContent.trim();
  }

  function uniqueId(base, used) {
    var id = base;
    var index = 2;
    while (used[id] || document.getElementById(id)) {
      id = base + '-' + index;
      index += 1;
    }
    used[id] = true;
    return id;
  }

  function adjustLayout(tocVisible) {
    var layout = document.querySelector('.post-layout');
    if (!layout) return;
    var leftSidebar = layout.querySelector('.post-sidebar-left');
    var rightSidebar = layout.querySelector('.post-sidebar-right');
    var hasLeft = leftSidebar && leftSidebar.textContent.trim().length > 0;
    var hasRight = rightSidebar && tocVisible;

    if (hasLeft && hasRight) {
      layout.style.gridTemplateColumns = '240px minmax(0, 1fr) 220px';
    } else if (hasLeft) {
      layout.style.gridTemplateColumns = '240px minmax(0, 1fr)';
      if (rightSidebar) rightSidebar.style.display = 'none';
    } else if (hasRight) {
      layout.style.gridTemplateColumns = 'minmax(0, 1fr) 220px';
      if (leftSidebar) leftSidebar.style.display = 'none';
    } else {
      layout.style.gridTemplateColumns = '1fr';
      if (leftSidebar) leftSidebar.style.display = 'none';
      if (rightSidebar) rightSidebar.style.display = 'none';
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    var toc = document.getElementById('post-toc');
    var tocContent = document.getElementById('post-toc-content');
    var headings = Array.prototype.slice.call(document.querySelectorAll('.post h2, .post h3, .post h4'));

    if (!toc || !tocContent || headings.length === 0) {
      if (toc) toc.style.display = 'none';
      adjustLayout(false);
      return;
    }

    var usedIds = Object.create(null);
    var list = document.createElement('ul');

    headings.forEach(function(heading) {
      var text = headingText(heading);
      if (!text) return;
      if (!heading.id) {
        heading.id = uniqueId(slugify(text), usedIds);
      } else {
        usedIds[heading.id] = true;
      }

      var level = parseInt(heading.tagName.charAt(1), 10);
      var item = document.createElement('li');
      item.className = 'post-toc-item post-toc-level-' + level;

      var link = document.createElement('a');
      link.href = '#' + heading.id;
      link.textContent = text;
      link.className = 'post-toc-link post-toc-h' + level;
      item.appendChild(link);
      list.appendChild(item);
    });

    if (!list.children.length) {
      toc.style.display = 'none';
      adjustLayout(false);
      return;
    }

    tocContent.appendChild(list);

    var allLinks = tocContent.querySelectorAll('.post-toc-link');
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          allLinks.forEach(function(link) { link.classList.remove('current'); });
          var activeLink = tocContent.querySelector('a[href="#' + entry.target.id + '"]');
          if (activeLink) activeLink.classList.add('current');
        }
      });
    }, { rootMargin: '-80px 0px -70% 0px' });

    headings.forEach(function(heading) {
      if (heading.id) observer.observe(heading);
    });

    adjustLayout(true);
  });
})();
</script>
