{% assign page_content_downcase = page.content | downcase %}
{% assign rendered_content_downcase = content | downcase %}
{% if page_content_downcase contains "```mermaid" or rendered_content_downcase contains "language-mermaid" %}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  var isDark = document.documentElement.classList.contains('dark');

  function isMermaidCode(code) {
    if (!code) return false;
    var lang = (code.getAttribute('data-lang') || '').toLowerCase();
    if (lang === 'mermaid') return true;

    return Array.prototype.some.call(code.classList, function(className) {
      return className.toLowerCase() === 'language-mermaid';
    });
  }

  function makeMermaidDiv(code) {
    var mermaidDiv = document.createElement('div');
    mermaidDiv.className = 'mermaid';
    mermaidDiv.textContent = code.textContent;
    return mermaidDiv;
  }

  // Convert Rouge-wrapped mermaid code blocks into <div class="mermaid">
  document.querySelectorAll('.post .highlight').forEach(function(el) {
    var code = Array.prototype.find.call(el.querySelectorAll('code'), isMermaidCode);
    if (!code) return;
    el.parentNode.replaceChild(makeMermaidDiv(code), el);
  });

  // Also handle plain <pre><code class="language-mermaid"> blocks (non-Rouge)
  document.querySelectorAll('.post pre code').forEach(function(code) {
    if (!isMermaidCode(code)) return;
    var pre = code.closest('pre');
    if (!pre) return;
    pre.parentNode.replaceChild(makeMermaidDiv(code), pre);
  });

  // Store original text for re-render on theme change
  document.querySelectorAll('.post .mermaid').forEach(function(el) {
    el.setAttribute('data-original', el.textContent);
  });

  mermaid.initialize({
    startOnLoad: false,
    theme: isDark ? 'dark' : 'default',
    themeVariables: {
      fontFamily: 'Inter, sans-serif',
      fontSize: '14px'
    }
  });

  function renderMermaid() {
    mermaid.run().catch(function(error) {
      document.querySelectorAll('.post .mermaid').forEach(function(el) {
        if (el.getAttribute('data-processed') === 'true') return;
        el.classList.add('mermaid-error');
        el.textContent = el.getAttribute('data-original') || el.textContent;
      });
      console.error('Mermaid render failed:', error);
    });
  }

  renderMermaid();

  // Re-render on theme toggle
  var observer = new MutationObserver(function() {
    var newDark = document.documentElement.classList.contains('dark');
    mermaid.initialize({ startOnLoad: false, theme: newDark ? 'dark' : 'default' });
    document.querySelectorAll('.mermaid').forEach(function(el) {
      el.removeAttribute('data-processed');
      el.innerHTML = el.getAttribute('data-original');
      el.classList.remove('mermaid-error');
    });
    renderMermaid();
  });

  observer.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['class']
  });
</script>
{% endif %}
